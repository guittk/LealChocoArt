<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leal ChocoArt — Confeitaria Artesanal</title>
<meta name="description" content="Bombons, pães de mel e doces artesanais feitos à mão pela Julia. Peça sua encomenda ou encontre a gente vendendo pessoalmente.">
<link rel="icon" type="image/png" href="__LOGO_CIRCLE__">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,450&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#242424; --bg-alt:#2b2830; --card:#2f2c34; --card-2:#353039;
    --ink:#f9e1eb; --ink-soft:#bfa8c9;
    --primary:#b070f9; --primary-dark:#9a53ef; --lilac:#d1a9ff; --lilac-soft:rgba(209,169,255,0.16);
    --blush:#f9e1eb; --blush-soft:rgba(249,225,235,0.10); --line:rgba(255,255,255,0.12);
  }
  html{scroll-behavior:smooth;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:450;margin:0;}
  p{margin:0;}
  button,select,input,textarea{font-family:inherit;}
  button{cursor:pointer;}
  a{color:inherit;text-decoration:none;}
  .container{max-width:1120px;margin:0 auto;padding:0 20px;}
  .icon{display:inline-block;vertical-align:middle;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

  /* header */
  header{position:sticky;top:0;z-index:40;background:rgba(36,36,36,0.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .header-inner{max-width:1120px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo-img{height:34px;display:block;}
  .desktop-nav{display:flex;gap:26px;align-items:center;}
  .nav-link{background:none;border:none;font-weight:600;font-size:14.5px;color:var(--ink-soft);padding-bottom:4px;border-bottom:2px solid transparent;}
  .nav-link:hover{color:var(--ink);}
  .mobile-toggle{display:none;background:none;border:none;color:var(--ink);}
  .mobile-menu{border-top:1px solid var(--line);padding:10px 20px 18px;display:flex;flex-direction:column;gap:4px;}
  .mobile-menu .nav-link{text-align:left;padding:10px 4px;font-size:15.5px;}
  @media (max-width:860px){ .desktop-nav{display:none !important;} .mobile-toggle{display:inline-flex !important;} }

  /* buttons */
  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#241a2b;border:none;padding:13px 24px;border-radius:20px 8px 20px 8px;font-weight:800;font-size:14.5px;transition:transform .15s ease, background .15s ease;}
  .btn-primary:hover{background:var(--lilac);transform:translateY(-1px);}
  .btn-primary[disabled]{opacity:.45;cursor:not-allowed;transform:none !important;}
  .btn-secondary{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--lilac);border:1.5px solid var(--primary);padding:12px 22px;border-radius:20px 8px 20px 8px;font-weight:700;font-size:14.5px;transition:background .15s ease;}
  .btn-secondary:hover{background:var(--lilac-soft);}
  .btn-secondary.sm, .btn-primary.sm{padding:9px 16px;font-size:13px;}
  .btn-ghost{background:none;border:none;color:var(--ink-soft);font-weight:600;font-size:12.5px;}

  .pill{display:inline-block;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;letter-spacing:.3px;}
  .pill-lilac{background:var(--lilac-soft);color:var(--lilac);}
  .pill-blush{background:var(--blush-soft);color:var(--blush);}
  .section-label{font-weight:700;font-size:12.5px;letter-spacing:2px;text-transform:uppercase;color:var(--lilac);margin-bottom:8px;}

  /* hero */
  .hero{background:radial-gradient(120% 100% at 15% 0%, rgba(176,112,249,0.16), transparent 55%), var(--bg);padding:56px 20px 64px;}
  .hero-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;}
  @media (max-width:760px){ .hero-grid{grid-template-columns:1fr !important;} }
  .hero h1{font-size:clamp(32px,5vw,52px);line-height:1.1;margin:8px 0 16px;color:var(--ink);}
  .hero h1 em{font-style:italic;color:var(--lilac);}
  .hero p.lead{font-size:16.5px;color:var(--ink-soft);line-height:1.7;max-width:460px;}
  .hero-photo{width:100%;border-radius:28px 28px 90px 28px;overflow:hidden;border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,0.4);}
  .hero-photo img{width:100%;display:block;object-fit:cover;}

  /* cards */
  .product-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px,1fr));gap:22px;}
  .product-card{background:var(--card);border-radius:22px 22px 22px 4px;overflow:hidden;border:1px solid var(--line);transition:transform .18s ease, box-shadow .18s ease;}
  .product-card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(0,0,0,0.35);}
  .product-photo{width:100%;aspect-ratio:4/3;border-radius:18px 18px 60px 18px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--card-2);}
  .product-photo img{width:100%;height:100%;object-fit:cover;}
  .product-photo .unavailable-badge{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px;letter-spacing:1px;text-transform:uppercase;}
  .qty-row{display:flex;align-items:center;gap:12px;}
  .qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--lilac);}
  .qty-btn:hover{border-color:var(--primary);}
  .qty-value{font-weight:800;font-size:15px;min-width:18px;text-align:center;}
  details.ingredients summary{cursor:pointer;font-size:12px;color:var(--ink-soft);font-weight:700;list-style:none;}
  details.ingredients summary::-webkit-details-marker{display:none;}
  details.ingredients p{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}

  /* cart summary */
  .cart-box{background:var(--card);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:20px 22px;margin-top:30px;}
  .cart-line{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink-soft);padding:6px 0;border-bottom:1px dashed var(--line);}
  .cart-line:last-of-type{border-bottom:none;}
  .cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-top:10px;color:var(--ink);}

  /* status card */
  .status-card{background:var(--card);border:1px solid var(--line);border-radius:24px 24px 24px 4px;padding:22px 26px;display:flex;align-items:center;gap:18px;max-width:460px;}
  .status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}

  /* map + pin */
  .map-wrap{position:relative;border-radius:18px 18px 18px 4px;overflow:hidden;border:1px solid var(--line);background:var(--card-2);margin-top:24px;cursor:crosshair;}
  .map-wrap img{width:100%;display:block;}
  .map-pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .map-pin-label{background:var(--primary);color:#241a2b;font-weight:800;font-size:11.5px;padding:4px 9px;border-radius:8px 8px 8px 2px;white-space:nowrap;margin-bottom:2px;box-shadow:0 4px 10px rgba(0,0,0,0.4);}

  /* footer */
  footer{border-top:1px solid var(--line);background:var(--bg-alt);margin-top:50px;}
  .footer-inner{max-width:1120px;margin:0 auto;padding:32px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;}
  .footer-icons{display:flex;gap:20px;align-items:center;}
  .footer-copy{text-align:center;font-size:12px;color:var(--ink-soft);padding-bottom:20px;}

  /* forms */
  .field{display:block;margin-bottom:16px;}
  .field label{display:block;font-weight:700;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.3px;}
  .input{width:100%;height:44px;border-radius:10px;border:1.5px solid var(--line);padding:0 14px;font-size:14.5px;color:var(--ink);background:var(--card-2);outline:none;}
  .input:focus{border-color:var(--primary);}
  .input::placeholder{color:var(--ink-soft);}
  textarea.input{height:80px;resize:vertical;padding-top:10px;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .error-text{font-size:12.5px;color:#ff9d9d;margin-top:6px;min-height:16px;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,8,12,0.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--bg-alt);border:1px solid var(--line);border-radius:22px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:28px 26px;position:relative;}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--card);border:1px solid var(--line);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--ink);}

  /* admin */
  .tab-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
  .tab-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-weight:700;font-size:13px;}
  .tab-btn.active{border-color:var(--primary);background:var(--primary);color:#241a2b;}
  .admin-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;flex-wrap:wrap;margin-bottom:10px;}
  .avail-toggle{padding:7px 14px;border-radius:999px;border:none;font-weight:700;font-size:12px;}
  .avail-on{background:rgba(78,201,140,0.18);color:#7fe0af;}
  .avail-off{background:rgba(240,110,140,0.18);color:#ff9db4;}
  .loc-btn{padding:14px 20px;border-radius:16px 16px 16px 4px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;text-align:left;min-width:160px;}
  .loc-btn.active{border-color:var(--primary);background:var(--lilac-soft);}
  .admin-loc-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px;}
  .file-input{font-size:12.5px;color:var(--ink-soft);}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);}}

  section[id]{scroll-margin-top:78px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- icons ---------- */
function icon(name, size, color){
  size = size || 18; color = color || 'currentColor';
  var paths = {
    menu:'<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>',
    close:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    chevronRight:'<polyline points="9 18 15 12 9 6"/>',
    chevronLeft:'<polyline points="15 18 9 12 15 6"/>',
    arrowRight:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
    check:'<polyline points="20 6 9 17 4 12"/>',
    plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    minus:'<line x1="5" y1="12" x2="19" y2="12"/>',
    trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
    whatsapp:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
    instagram:'<rect x="2.5" y="2.5" width="19" height="19" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.1" style="fill:currentColor"/>',
    mapPin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>',
    clock:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/>',
    settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>',
    clipboard:'<rect x="6" y="4" width="12" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/>',
    package:'<path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/>',
    treat:'<path d="M12 4c-4 3-7 6.5-7 10a7 7 0 0 0 14 0c0-3.5-3-7-7-10z"/>',
    bag:'<path d="M6 9V7a6 6 0 0 1 12 0v2"/><rect x="3" y="9" width="18" height="12" rx="2"/>'
  };
  return '<svg class="icon" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" style="color:'+color+'">'+(paths[name]||'')+'</svg>';
}

/* ---------- assets ---------- */
var ASSETS = {
  logoCircle: "Logo Circle.png",
  logoPrincipal: "Logo Principal.png",
  mapaFaculdade: "Mapa Faculdade.png",
  paoDeMel: "Pão_de_mel.png",
  bombomDeUva: "Bombom_de_uva.png"
};

/* ---------- data ---------- */
var state = {
  page: 'site',
  menuOpen: false,
  modalOpen: false,
  adminTab: 'produtos',
  products: [
    { id:'p1', name:'Bombom de Uva', desc:'Uva fresca envolta em chocolate belga meio amargo.', ingredients:'Chocolate belga 54%, uva in natura, manteiga de cacau.', price:6, available:true, photo:'bombomDeUva' },
    { id:'p2', name:'Pão de Mel', desc:'Massa macia de mel e especiarias, recheada com doce de leite.', ingredients:'Mel, canela, cravo, doce de leite artesanal, chocolate ao leite.', price:7.5, available:true, photo:'paoDeMel' },
    // { id:'p3', name:'Trufa de Maracujá', desc:'Ganache cremoso de maracujá envolto em chocolate branco.', ingredients:'Chocolate branco, polpa de maracujá, creme de leite fresco.', price:6.5, available:true, photo:null },
    // { id:'p4', name:'Brigadeiro Gourmet', desc:'Receita tradicional, ponto macio, com granulado belga.', ingredients:'Leite condensado, cacau 70%, manteiga, granulado belga.', price:5, available:true, photo:null },
    // { id:'p5', name:'Alfajor de Doce de Leite', desc:'Camadas amanteigadas com recheio generoso de doce de leite.', ingredients:'Farinha, manteiga, doce de leite, chocolate meio amargo.', price:8, available:false, photo:null },
    // { id:'p6', name:'Cesta de Chocolate Branco', desc:'Casquinha crocante recheada com creme de avelã.', ingredients:'Chocolate branco, creme de avelã, wafer.', price:7, available:true, photo:null }
  ],
  cart: {},
  orders: [],
  currentLocationId: 'condominio',
  locations: [
    { id:'faculdade', name:'Faculdade', hours:'09:20 – 09:40 e 11:40 – 12:00', mapImage:'mapaFaculdade', pin:{ x:63, y:44, label:'Sala A24' } },
    { id:'condominio', name:'Condomínio', hours:'13:00 – 22:00', mapImage:null, pin:null },
    { id:'ibav', name:'IBAV Sorocaba', hours:'11:40 - 12:00', mapImage:null, pin:null }
  ]
};

/* ---------- helpers ---------- */
function currency(v){ return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function parseRanges(hoursStr){
  var ranges = []; var re = /(\d{1,2}):(\d{2})\s*[–-]\s*(\d{1,2}):(\d{2})/g; var m;
  while((m = re.exec(hoursStr))){
    ranges.push([parseInt(m[1])*60+parseInt(m[2]), parseInt(m[3])*60+parseInt(m[4])]);
  }
  return ranges;
}
function timeToMinutes(t){ var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function getLocation(nameOrId){
  return state.locations.find(function(l){ return l.name === nameOrId || l.id === nameOrId; });
}
function cartItems(){
  return Object.keys(state.cart).filter(function(id){ return state.cart[id] > 0; }).map(function(id){
    var p = state.products.find(function(x){ return x.id === id; });
    return { product: p, qty: state.cart[id] };
  }).filter(function(i){ return i.product; });
}
function cartTotal(){ return cartItems().reduce(function(s,i){ return s + i.product.price * i.qty; }, 0); }
function cartCount(){ return cartItems().reduce(function(s,i){ return s + i.qty; }, 0); }

/* ---------- small components ---------- */
function LogoImg(cls){ return '<img class="'+(cls||'logo-img')+'" src="'+ASSETS.logoPrincipal+'" alt="Leal ChocoArt">'; }

function ProductPhoto(p){
  if (p.photo && ASSETS[p.photo]){
    return '<div class="product-photo"><img src="'+ASSETS[p.photo]+'" alt="'+esc(p.name)+'">' +
      (p.available ? '' : '<div class="unavailable-badge">Indisponível</div>') + '</div>';
  }
  return '<div class="product-photo">' + icon('treat', 46, 'var(--primary)') +
    (p.available ? '' : '<div class="unavailable-badge">Indisponível</div>') + '</div>';
}

function Pill(text, tone){ return '<span class="pill ' + (tone === 'blush' ? 'pill-blush' : 'pill-lilac') + '">' + text + '</span>'; }

function StatusCard(){
  var loc = state.currentLocationId ? getLocation(state.currentLocationId) : null;
  var color = loc ? '#4ec98c' : '#e07b8f';
  var bg = loc ? 'rgba(78,201,140,0.18)' : 'rgba(224,123,143,0.18)';
  var label = loc ? 'Vendendo agora' : 'Indisponível hoje';
  var place = loc ? loc.name : 'Voltamos em breve';
  var hours = loc ? loc.hours : '';
  return '<div class="status-card">' +
    '<div class="status-dot" style="background:'+color+';box-shadow:0 0 0 6px '+bg+'"></div>' +
    '<div><p style="font-weight:700;font-size:15.5px;margin:0">'+label+'</p>' +
    '<p style="font-size:13.5px;color:var(--ink-soft);margin:3px 0 0">'+esc(place) + (hours ? ' · ' + esc(hours) : '') + '</p></div>' +
    '</div>';
}

function MapWithPin(loc, editable){
  if (!loc || !loc.mapImage || !ASSETS[loc.mapImage]){
    return '<div class="map-wrap" style="height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:default">' +
      icon('mapPin',28,'var(--primary)') + '<p style="font-size:12.5px;color:var(--ink-soft)">Nenhum mapa configurado</p></div>';
  }
  var pinHtml = '';
  if (loc.pin){
    pinHtml = '<div class="map-pin" style="left:'+loc.pin.x+'%;top:'+loc.pin.y+'%">' +
      '<span class="map-pin-label">'+esc(loc.pin.label || 'Aqui')+'</span>' +
      icon('mapPin', 30, 'var(--primary)') + '</div>';
  }
  var attrs = editable ? ' data-action="mapClick" data-locid="'+loc.id+'"' : '';
  return '<div class="map-wrap"'+attrs+'><img src="'+ASSETS[loc.mapImage]+'" alt="Mapa '+esc(loc.name)+'" draggable="false">' + pinHtml + '</div>';
}

/* ---------- page sections (single page) ---------- */
function sectionHero(){
  return '<section class="hero" id="topo">' +
    '<div class="hero-grid">' +
      '<div>' +
        '<h1>Chocolate feito à mão,<br> <em>com arte e carinho.</em></h1>' +
        '<p class="lead">Bombons, pães de mel e doces artesanais produzidos em pequenos lotes pela Julia. Peça sua encomenda ou encontre a gente vendendo pessoalmente.</p>' +
        '<div style="display:flex;gap:14px;margin-top:28px;flex-wrap:wrap">' +
          '<a class="btn-primary" href="#produtos">Ver produtos '+icon('arrowRight',16)+'</a>' +
          '<button class="btn-secondary" data-action="openModal">Fazer encomenda</button>' +
        '</div>' +
      '</div>' +
      '<div class="hero-photo"><img src="'+ASSETS.bombomDeUva+'" alt="Bombom de uva Leal ChocoArt"></div>' +
    '</div></section>';
}

function sectionProdutos(){
  var cards = state.products.map(function(p){
    var qty = state.cart[p.id] || 0;
    var stepper = !p.available ? '<p style="font-size:12px;color:var(--ink-soft);font-weight:700">Indisponível</p>' :
      (qty > 0 ?
        '<div class="qty-row">' +
          '<button class="qty-btn" data-action="cartDec" data-id="'+p.id+'">'+icon('minus',14)+'</button>' +
          '<span class="qty-value">'+qty+'</span>' +
          '<button class="qty-btn" data-action="cartInc" data-id="'+p.id+'">'+icon('plus',14)+'</button>' +
        '</div>' :
        '<button class="btn-secondary sm" data-action="cartInc" data-id="'+p.id+'">'+icon('plus',14)+' Adicionar</button>'
      );

      '<div style="padding:10px">' + ProductPhoto(p) + '</div>' +

      '<p style="font-family:\'Fraunces\',serif;font-weight:450;font-size:18.5px;margin:0 0 5px;color:var(--ink)">'+esc(p.name)+'</p>' +
      '<p style="font-size:13px;color:var(--ink-soft);margin:0 0 8px;line-height:1.5">'+esc(p.desc)+'</p>' +
      '<details class="ingredients"><summary>Ver ingredientes</summary><p>'+esc(p.ingredients)+'</p></details>' +

          return '<div class="cart-line"><span>'+i.qty+'x '+esc(i.product.name)+'</span><span>'+currency(i.product.price*i.qty)+'</span></div>';

      return '<div class="admin-row">' +
        '<div style="width:44px;height:44px;border-radius:10px 10px 16px 10px;overflow:hidden;background:var(--card-2);display:flex;align-items:center;justify-content:center;flex-shrink:0">' +

        '<button data-action="removeProduct" data-id="'+p.id+'" style="background:none;border:none;color:var(--ink-soft)" aria-label="Remover produto">'+icon('trash',16)+'</button>' +
        '</div>';
    }).join('');

    if (state.orders.length === 0){
      body = '<p style="color:var(--ink-soft);font-size:14px">Nenhuma encomenda recebida ainda.</p>';
    } else {

        return '<div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin-bottom:10px">' +

          '<div><p style="font-weight:700;font-size:14.5px;margin:0">'+esc(o.nome)+' — '+esc(itemsStr)+'</p>' +

          (o.observacoes ? '<p style="font-size:12.5px;color:var(--ink-soft);margin:3px 0 0">Obs: '+esc(o.observacoes)+'</p>' : '') +

          '<select class="input" style="width:150px;height:34px;font-size:12.5px" data-action="setOrderStatus" data-id="'+o.id+'">' +
            ['pendente','producao','pronto','concluido','cancelado'].map(function(s){

    '<p class="section-label">Painel interno</p>' +
    '<h1 style="font-size:28px;margin:0 0 24px;display:flex;align-items:center;gap:10px">'+icon('settings',22,'var(--primary)')+' Administração</h1>' +

/* ---------- main render ---------- */
function render(){
  var content = state.page === 'admin'
    ? pageAdmin()
    : sectionHero() + sectionProdutos() + sectionLocalizacao() + sectionContato();

  document.getElementById('app').innerHTML =
    renderHeader() +
    '<main>' + content + '</main>' +
    renderFooter() +
    renderModal() +
    (state.confirmOpen ? renderConfirm() : '');
}

/* ---------- actions ---------- */
function go(page){ state.page = page; state.menuOpen = false; render(); window.scrollTo({top:0}); }
function openModal(){ state.modalOpen = true; render(); }
function closeModal(){ state.modalOpen = false; render(); }

document.addEventListener('click', function(e){
  var stopEl = e.target.closest('[data-stop]');
  var overlay = e.target.closest('[data-action="closeModalBg"], [data-action="closeConfirmBg"]');
  if (overlay && !stopEl){
    if (overlay.dataset.action === 'closeModalBg') closeModal();
    else { state.confirmOpen = false; render(); }
    return;
  }

  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;

  if (action === 'go') { e.preventDefault(); go(el.dataset.page); }
  else if (action === 'openModal') openModal();
  else if (action === 'closeModal') closeModal();
  else if (action === 'closeConfirm') { state.confirmOpen = false; render(); }
  else if (action === 'toggleMenu') { state.menuOpen = !state.menuOpen; render(); }
  else if (action === 'closeMenu') { state.menuOpen = false; render(); }
  else if (action === 'adminTab') { state.adminTab = el.dataset.tab; render(); }
  else if (action === 'cartInc') {
    var p = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (p && p.available) state.cart[p.id] = (state.cart[p.id] || 0) + 1;
    render();
  }
  else if (action === 'cartDec') {
    var id = el.dataset.id;
    state.cart[id] = Math.max(0, (state.cart[id] || 0) - 1);
    render();
  }
  else if (action === 'toggleAvailable') {
    var pa = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (pa) pa.available = !pa.available;
    render();
  }
  else if (action === 'removeProduct') {
    state.products = state.products.filter(function(x){ return x.id !== el.dataset.id; });
    render();
  }
  else if (action === 'setCurrentLocation') {
    state.currentLocationId = el.dataset.key === 'indisponivel' ? null : el.dataset.key;
    render();
  }
  else if (action === 'mapClick') {
    var loc = getLocation(el.dataset.locid);
    var rect = el.getBoundingClientRect();
    var xPct = ((e.clientX - rect.left) / rect.width) * 100;
    var yPct = ((e.clientY - rect.top) / rect.height) * 100;
    if (loc) loc.pin = { x: Math.round(xPct*10)/10, y: Math.round(yPct*10)/10, label: (loc.pin && loc.pin.label) || '' };
    render();
  }
  else if (action === 'removePin') {
    var locr = getLocation(el.dataset.locid);
    if (locr) locr.pin = null;
    render();
  }
});

document.addEventListener('change', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'setPrice') {
    var p = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (p) p.price = Number(el.value) || 0;
  }
  else if (action === 'setOrderStatus') {
    var o = state.orders.find(function(x){ return x.id === el.dataset.id; });
    if (o) o.status = el.value;
  }
  else if (action === 'setHours') {
    var loc = getLocation(el.dataset.locid);
    if (loc) loc.hours = el.value;
    render();
  }
  else if (action === 'setPinLabel') {
    var locl = getLocation(el.dataset.locid);
    if (locl && locl.pin) locl.pin.label = el.value;
  }
  else if (action === 'uploadMap') {
    var locid = el.dataset.locid;
    var file = el.files && el.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var key = 'custom_' + locid;
      ASSETS[key] = ev.target.result;
      var loc = getLocation(locid);
      if (loc) loc.mapImage = key;
      render();
    };
    reader.readAsDataURL(file);
  }
  else if (action === 'localChange') {
    var loc2 = getLocation(el.value);
    var hint = document.getElementById('localHint');
    if (hint) hint.textContent = loc2 ? 'Horário de funcionamento: ' + loc2.hours : '';
  }
});

document.addEventListener('submit', function(e){
  var form = e.target.closest('[data-action="submitOrderForm"]');
  if (!form) return;
  e.preventDefault();
  var errorEl = document.getElementById('formError');
  errorEl.textContent = '';

  var items = cartItems();
  if (items.length === 0){ errorEl.textContent = 'Seu carrinho está vazio. Adicione ao menos um produto.'; return; }

  var nome = document.getElementById('f-nome').value.trim();
  var telefone = document.getElementById('f-telefone').value.trim();
  var localName = document.getElementById('f-local').value;
  var data = document.getElementById('f-data').value;
  var horario = document.getElementById('f-horario').value;
  var observacoes = document.getElementById('f-observacoes').value.trim();

  if (!nome || !telefone || !localName || !data){ errorEl.textContent = 'Preencha nome, telefone, local e data.'; return; }

  var loc = getLocation(localName);
  var ranges = loc ? parseRanges(loc.hours) : [];
  if (ranges.length > 0){
    if (!horario){ errorEl.textContent = 'Informe um horário dentro do funcionamento: ' + loc.hours; return; }
    var mins = timeToMinutes(horario);
    var ok = ranges.some(function(r){ return mins >= r[0] && mins <= r[1]; });
    if (!ok){ errorEl.textContent = 'Horário fora do funcionamento. Disponível: ' + loc.hours; return; }
  }

  var order = {
    id: String(Date.now()),
    nome: nome, telefone: telefone, local: localName, data: data, horario: horario, observacoes: observacoes,
    items: items.map(function(i){ return { name: i.product.name, qty: i.qty, price: i.product.price }; }),
    total: cartTotal(),
    status: 'pendente'
  };
  state.orders.unshift(order);
  state.cart = {};
  state.modalOpen = false;
  state.confirmOpen = true;
  render();
});

render();
</script>
</body>
</html>
