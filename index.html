<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leal ChocoArt — Confeitaria Artesanal</title>
<meta name="description" content="Bombons, pães de mel e doces artesanais feitos à mão pela Julia. Peça sua encomenda ou encontre a gente vendendo pessoalmente.">
<link rel="icon" type="image/png" href="__LOGO_CIRCLE__">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="light"]{
    --bg:#FFF9FC; --bg-alt:#F7ECFC; --card:#FFFFFF; --card-2:#FBF3FD;
    --ink:#3B2350; --ink-soft:#8E799B;
    --primary:#A66BF0; --primary-dark:#8A4FDB; --primary-ink:#2E1642;
    --pink:#FF9FC7; --pink-soft:#FFE3EF;
    --lilac-soft:#EEDCFB; --line:#EDDCF6;
    --shadow-tint: rgba(166,107,240,0.18);
    --sticker-shadow: 5px 5px 0 rgba(59,35,80,0.12);
  }
  [data-theme="dark"]{
    --bg:#241A30; --bg-alt:#2B2038; --card:#332740; --card-2:#3A2C49;
    --ink:#F8ECFC; --ink-soft:#C7ADD9;
    --primary:#C79BFF; --primary-dark:#B27CFF; --primary-ink:#291840;
    --pink:#FFB0D2; --pink-soft:rgba(255,159,199,0.14);
    --lilac-soft:rgba(199,155,255,0.16); --line:rgba(255,255,255,0.10);
    --shadow-tint: rgba(0,0,0,0.45);
    --sticker-shadow: 5px 5px 0 rgba(0,0,0,0.35);
  }
  html{scroll-behavior:smooth;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Quicksand',sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s ease, color .25s ease;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0;}
  p{margin:0;}
  button,select,input,textarea{font-family:inherit;}
  button{cursor:pointer;}
  a{color:inherit;text-decoration:none;}
  .container{max-width:1120px;margin:0 auto;padding:0 20px;}
  .icon{display:inline-block;vertical-align:middle;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* decorative blobs */
  .blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:.55;pointer-events:none;z-index:0;}

  /* header */
  header{position:sticky;top:0;z-index:40;background:var(--bg);border-bottom:2px dashed var(--line);}
  .header-inner{max-width:1120px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .logo-img{height:38px;display:block;}
  .desktop-nav{display:flex;gap:22px;align-items:center;}
  .nav-link{background:none;border:none;font-weight:700;font-size:14.5px;color:var(--ink-soft);padding:6px 4px;border-radius:8px;}
  .nav-link:hover{color:var(--primary-dark);}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--line);background:var(--card);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .15s ease;}
  .icon-btn:hover{transform:rotate(-8deg) scale(1.05);border-color:var(--primary);}
  .mobile-toggle{display:none;background:none;border:none;color:var(--ink);}
  .mobile-menu{border-top:2px dashed var(--line);padding:10px 20px 18px;display:flex;flex-direction:column;gap:4px;}
  .mobile-menu .nav-link{text-align:left;padding:10px 4px;font-size:15.5px;}
  @media (max-width:860px){ .desktop-nav{display:none !important;} .mobile-toggle{display:inline-flex !important;} }

  /* buttons - sticker/cute style */
  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:var(--primary-ink);border:2.5px solid var(--primary-ink);padding:12px 22px;border-radius:999px;font-weight:700;font-size:14.5px;box-shadow:var(--sticker-shadow);transition:transform .12s ease, box-shadow .12s ease;}
  .btn-primary:hover{transform:translate(-2px,-2px) rotate(-1deg);box-shadow:7px 7px 0 var(--shadow-tint);}
  .btn-primary:active{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--shadow-tint);}
  .btn-primary[disabled]{opacity:.45;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
  .btn-secondary{display:inline-flex;align-items:center;gap:8px;background:var(--card);color:var(--primary-dark);border:2.5px solid var(--primary);padding:11px 20px;border-radius:999px;font-weight:700;font-size:14.5px;transition:transform .12s ease;}
  .btn-secondary:hover{transform:translate(-2px,-2px) rotate(1deg);background:var(--lilac-soft);}
  .btn-secondary.sm, .btn-primary.sm{padding:8px 16px;font-size:13px;}
  .btn-ghost{background:none;border:none;color:var(--ink-soft);font-weight:700;font-size:12.5px;}

  .pill{display:inline-block;font-size:12px;font-weight:700;padding:5px 13px;border-radius:999px;letter-spacing:.2px;border:1.5px solid transparent;}
  .pill-lilac{background:var(--lilac-soft);color:var(--primary-dark);}
  .pill-blush{background:var(--pink-soft);color:var(--pink);}
  .section-label{font-weight:700;font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:6px;}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:52px 20px 70px;}
  .hero-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;position:relative;z-index:1;}
  @media (max-width:760px){ .hero-grid{grid-template-columns:1fr !important;} }
  .hero h1{font-size:clamp(30px,5vw,48px);line-height:1.15;margin:8px 0 16px;color:var(--ink);}
  .hero h1 span{color:var(--primary-dark);}
  .hero p.lead{font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:460px;font-weight:500;}
  .hero-photo-wrap{position:relative;}
  .hero-photo{width:100%;border-radius:38% 62% 63% 37% / 45% 40% 60% 55%;overflow:hidden;border:4px solid var(--card);box-shadow:0 22px 0 -6px var(--pink-soft), 0 20px 40px var(--shadow-tint);}
  .hero-photo img{width:100%;display:block;object-fit:cover;aspect-ratio:1/1;}
  .hero-badge{position:absolute;width:96px;height:96px;bottom:-14px;left:-14px;animation:spin 18s linear infinite;filter:drop-shadow(0 6px 10px var(--shadow-tint));}
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* cards */
  .product-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px,1fr));gap:22px;}
  .product-card{background:var(--card);border-radius:26px;overflow:hidden;border:2px solid var(--line);transition:transform .18s ease, box-shadow .18s ease;}
  .product-card:hover{transform:translateY(-4px) rotate(-.5deg);box-shadow:6px 10px 0 var(--shadow-tint);}
  .product-photo{width:100%;aspect-ratio:4/3;border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--card-2);}
  .product-photo img{width:100%;height:100%;object-fit:cover;}
  .product-photo .unavailable-badge{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px;letter-spacing:1px;text-transform:uppercase;}
  .qty-row{display:flex;align-items:center;gap:12px;}
  .qty-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--primary-dark);}
  .qty-btn:hover{border-color:var(--primary);}
  .qty-value{font-weight:800;font-size:15px;min-width:18px;text-align:center;}
  details.ingredients summary{cursor:pointer;font-size:12px;color:var(--ink-soft);font-weight:700;list-style:none;}
  details.ingredients summary::-webkit-details-marker{display:none;}
  details.ingredients p{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}

  /* cart summary */
  .cart-box{background:var(--card-2);border:2px dashed var(--line);border-radius:22px;padding:20px 22px;margin-top:30px;}
  .cart-line{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink-soft);padding:6px 0;border-bottom:1px dashed var(--line);}
  .cart-line:last-of-type{border-bottom:none;}
  .cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-top:10px;color:var(--ink);}

  /* status card */
  .status-card{background:var(--card);border:2px solid var(--line);border-radius:24px;padding:20px 24px;display:flex;align-items:center;gap:16px;max-width:460px;}
  .status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}

  /* map + pin */
  .map-wrap{position:relative;border-radius:20px;overflow:hidden;border:2px solid var(--line);background:var(--card-2);margin-top:22px;cursor:crosshair;}
  .map-wrap img{width:100%;display:block;}
  .map-pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .map-pin-label{background:var(--primary);color:var(--primary-ink);font-weight:800;font-size:11.5px;padding:4px 10px;border-radius:999px;white-space:nowrap;margin-bottom:2px;box-shadow:0 4px 10px var(--shadow-tint);}

  /* footer */
  footer{border-top:2px dashed var(--line);background:var(--bg-alt);margin-top:50px;}
  .footer-inner{max-width:1120px;margin:0 auto;padding:30px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;}
  .footer-icons{display:flex;gap:18px;align-items:center;}
  .footer-copy{text-align:center;font-size:12px;color:var(--ink-soft);padding-bottom:20px;}

  /* forms */
  .field{display:block;margin-bottom:16px;}
  .field label{display:block;font-weight:700;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.2px;}
  .input{width:100%;height:44px;border-radius:14px;border:2px solid var(--line);padding:0 14px;font-size:14.5px;color:var(--ink);background:var(--card-2);outline:none;}
  .input:focus{border-color:var(--primary);}
  .input::placeholder{color:var(--ink-soft);}
  textarea.input{height:80px;resize:vertical;padding-top:10px;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .error-text{font-size:12.5px;color:#e0537a;margin-top:6px;min-height:16px;font-weight:700;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(59,35,80,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
  .modal{background:var(--bg);border:3px solid var(--line);border-radius:28px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:28px 26px;position:relative;box-shadow:8px 8px 0 var(--shadow-tint);}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--card);border:2px solid var(--line);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink);}

  /* admin */
  .tab-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
  .tab-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:999px;border:2px solid var(--line);background:var(--card);color:var(--ink-soft);font-weight:700;font-size:13px;}
  .tab-btn.active{border-color:var(--primary-ink);background:var(--primary);color:var(--primary-ink);}
  .admin-row{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);border-radius:18px;padding:12px 16px;flex-wrap:wrap;margin-bottom:10px;}
  .avail-toggle{padding:7px 14px;border-radius:999px;border:none;font-weight:700;font-size:12px;}
  .avail-on{background:rgba(78,201,140,0.18);color:#2f8f5e;}
  .avail-off{background:rgba(224,83,122,0.18);color:#c94a6d;}
  .loc-btn{padding:14px 20px;border-radius:18px;border:2px solid var(--line);background:var(--card);cursor:pointer;text-align:left;min-width:160px;}
  .loc-btn.active{border-color:var(--primary-ink);background:var(--lilac-soft);}
  .admin-loc-card{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px 20px;margin-bottom:16px;}
  .file-input{font-size:12.5px;color:var(--ink-soft);}
  .login-box{max-width:400px;margin:70px auto;background:var(--card);border:2px solid var(--line);border-radius:26px;padding:32px 28px;text-align:center;box-shadow:6px 6px 0 var(--shadow-tint);}
  .fw-banner{background:var(--pink-soft);border:2px dashed var(--pink);border-radius:16px;padding:12px 16px;font-size:12.5px;color:var(--ink);margin-bottom:20px;text-align:left;}

  [data-theme="dark"] .avail-on{color:#7fe0af;}
  [data-theme="dark"] .avail-off{color:#ff9db4;}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);}}

  section[id]{scroll-margin-top:82px;}
</style>
</head>

/* ---------- helpers ---------- */
function currency(v){ return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function parseRanges(hoursStr){
  var ranges = []; var re = /(\d{1,2}):(\d{2})\s*[–-]\s*(\d{1,2}):(\d{2})/g; var m;
  while((m = re.exec(hoursStr))){
    ranges.push([parseInt(m[1])*60+parseInt(m[2]), parseInt(m[3])*60+parseInt(m[4])]);
  }
  return ranges;
}
function timeToMinutes(t){ var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function getLocation(nameOrId){
  return state.locations.find(function(l){ return l.name === nameOrId || l.id === nameOrId; });
}
function cartItems(){
  return Object.keys(state.cart).filter(function(id){ return state.cart[id] > 0; }).map(function(id){
    var p = state.products.find(function(x){ return x.id === id; });
    return { product: p, qty: state.cart[id] };
  }).filter(function(i){ return i.product; });
}
function cartTotal(){ return cartItems().reduce(function(s,i){ return s + i.product.price * i.qty; }, 0); }

/* ---------- firebase sync ---------- */
function objToArray(obj){
  return Object.keys(obj || {}).map(function(id){ var v = obj[id] || {}; v.id = id; return v; });
}
function initFirebaseSync(){
  if (!FIREBASE_READY) return;
  fbDb.ref('products').on('value', function(snap){
    var val = snap.val();
    if (val) { state.products = objToArray(val); render(); }
  });
  fbDb.ref('locations').on('value', function(snap){
    var val = snap.val();
    if (val) { state.locations = objToArray(val); render(); }
  });
  fbDb.ref('currentLocationId').on('value', function(snap){
    var val = snap.val();
    state.currentLocationId = (val === undefined) ? state.currentLocationId : val;
    render();
  });
  fbDb.ref('orders').on('value', function(snap){
    var val = snap.val();
    state.orders = objToArray(val).sort(function(a,b){ return Number(b.id) - Number(a.id); });
    if (state.page === 'admin') render();
  });
  fbAuth.onAuthStateChanged(function(user){
    state.authUser = user;
    render();
  });
}
function seedFirebaseIfEmpty(){
  if (!FIREBASE_READY) return;
  fbDb.ref('products').once('value', function(snap){
    if (!snap.val()){
      var obj = {};
      DEFAULT_PRODUCTS.forEach(function(p){ obj[p.id] = p; });
      fbDb.ref('products').set(obj);
    }
  });
  fbDb.ref('locations').once('value', function(snap){
    if (!snap.val()){
      var obj = {};
      DEFAULT_LOCATIONS.forEach(function(l){ obj[l.id] = l; });
      fbDb.ref('locations').set(obj);
    }
  });
  fbDb.ref('currentLocationId').once('value', function(snap){
    if (snap.val() === null) fbDb.ref('currentLocationId').set(state.currentLocationId);
  });
}
function dbSet(path, value){ if (FIREBASE_READY) fbDb.ref(path).set(value).catch(function(e){ console.error(e); }); }
function dbUpdate(path, patch){ if (FIREBASE_READY) fbDb.ref(path).update(patch).catch(function(e){ console.error(e); }); }
function dbRemove(path){ if (FIREBASE_READY) fbDb.ref(path).remove().catch(function(e){ console.error(e); }); }
function dbPushOrder(order){
  if (FIREBASE_READY) fbDb.ref('orders/' + order.id).set(order).catch(function(e){ console.error(e); });
}

          '<select class="input" style="width:150px;height:34px;font-size:12.5px" data-action="setOrderStatus" data-id="'+o.id+'">' +
            ['pendente','producao','pronto','concluido','cancelado'].map(function(s){
              var labels = {pendente:'Pendente',producao:'Em produção',pronto:'Pronto',concluido:'Concluído',cancelado:'Cancelado'};
              return '<option value="'+s+'"'+(o.status===s?' selected':'')+'>'+labels[s]+'</option>';
            }).join('') +
          '</select></div></div>';
      }).join('');
    }
  } else if (tab === 'local'){
    var currentBtns = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:30px">' +
      state.locations.map(function(l){
        return '<button class="loc-btn '+(state.currentLocationId===l.id?'active':'')+'" data-action="setCurrentLocation" data-key="'+l.id+'">' +
          '<p style="font-weight:700;font-size:14px;margin:0">'+esc(l.name)+'</p>' +
          '<p style="font-size:12px;color:var(--ink-soft);margin:3px 0 0">Vendendo agora</p></button>';
      }).join('') +
      '<button class="loc-btn '+(state.currentLocationId===null?'active':'')+'" data-action="setCurrentLocation" data-key="indisponivel">' +
        '<p style="font-weight:700;font-size:14px;margin:0">Indisponível</p><p style="font-size:12px;color:var(--ink-soft);margin:3px 0 0">Nenhum ponto ativo</p></button>' +
      '</div>';

    var locEditors = state.locations.map(function(l){
      return '<div class="admin-loc-card">' +
        '<p style="font-weight:800;font-size:15px;margin:0 0 12px">'+esc(l.name)+'</p>' +
        '<div class="field"><label>Horário de funcionamento</label>' +
          '<input class="input" value="'+esc(l.hours)+'" data-action="setHours" data-locid="'+l.id+'"></div>' +
        '<div class="field"><label>Imagem do mapa</label>' +
          '<input class="file-input" type="file" accept="image/*" data-action="uploadMap" data-locid="'+l.id+'"></div>' +
        MapWithPin(l, true) +
        '<p class="hint">Clique no mapa para posicionar o marcador.</p>' +
        '<div class="field" style="margin-top:12px"><label>Texto do marcador (ex: Sala A24)</label>' +
          '<input class="input" placeholder="Ex: Sala A24" value="'+esc(l.pin ? l.pin.label : '')+'" data-action="setPinLabel" data-locid="'+l.id+'" '+(l.pin?'':'disabled')+'></div>' +
        (l.pin ? '<button class="btn-ghost" data-action="removePin" data-locid="'+l.id+'">Remover marcador</button>' : '') +
        '</div>';
    }).join('');

    body = currentBtns + locEditors;
  } else if (tab === 'producao'){
    var map = {};
    state.orders.filter(function(o){ return o.status !== 'cancelado'; }).forEach(function(o){
      (o.items||[]).forEach(function(i){ map[i.name] = (map[i.name] || 0) + Number(i.qty || 0); });
    });
    var entries = Object.keys(map);
    if (entries.length === 0){
      body = '<p style="color:var(--ink-soft);font-size:14px">Sem encomendas para produzir ainda.</p>';
    } else {
      body = entries.map(function(name){
        return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:2px solid var(--line);border-radius:18px;padding:14px 18px;margin-bottom:10px">' +
          '<p style="font-weight:700;font-size:14.5px;margin:0">'+esc(name)+'</p>' + Pill('Produzir ' + map[name],'lilac') + '</div>';
      }).join('');
    }
  }

  return '<div class="container" style="max-width:1000px;padding:40px 20px 80px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px">' +
      '<h1 style="font-size:26px;display:flex;align-items:center;gap:10px">'+icon('settings',22,'var(--primary)')+' Administração</h1>' +
      '<div style="display:flex;align-items:center;gap:10px">' +
        (state.authUser ? '<span style="font-size:12.5px;color:var(--ink-soft)">'+esc(state.authUser.email)+'</span>' : '') +
        (FIREBASE_READY ? '<button class="btn-ghost" data-action="logout">'+icon('logout',14)+' Sair</button>' : '') +
      '</div>' +
    '</div>' +
    '<div class="tab-row">' + tabsHtml + '</div>' +
    '<div>' + body + '</div>' +
    '</div>';
}

function pageAdmin(){
  if (FIREBASE_READY && !state.authUser) return pageAdminLogin();
  return pageAdminPanel();
}

/* ---------- main render ---------- */
function render(){
  document.documentElement.setAttribute('data-theme', state.theme);
  var content = state.page === 'admin'
    ? pageAdmin()
    : sectionHero() + sectionProdutos() + sectionLocalizacao() + sectionContato();

  document.getElementById('app').innerHTML =
    renderHeader() +
    '<main>' + content + '</main>' +
    renderFooter() +
    renderModal() +
    (state.confirmOpen ? renderConfirm() : '');
}

/* ---------- actions ---------- */
function go(page){ state.page = page; state.menuOpen = false; state.authError = ''; render(); window.scrollTo({top:0}); }
function openModal(){ state.modalOpen = true; render(); }
function closeModal(){ state.modalOpen = false; render(); }

document.addEventListener('click', function(e){
  var stopEl = e.target.closest('[data-stop]');
  var overlay = e.target.closest('[data-action="closeModalBg"], [data-action="closeConfirmBg"]');
  if (overlay && !stopEl){
    if (overlay.dataset.action === 'closeModalBg') closeModal();
    else { state.confirmOpen = false; render(); }
    return;
  }

  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;

  if (action === 'go') { e.preventDefault(); go(el.dataset.page); }
  else if (action === 'openModal') openModal();
  else if (action === 'closeModal') closeModal();
  else if (action === 'closeConfirm') { state.confirmOpen = false; render(); }
  else if (action === 'toggleMenu') { state.menuOpen = !state.menuOpen; render(); }
  else if (action === 'closeMenu') { state.menuOpen = false; render(); }
  else if (action === 'toggleTheme') { state.theme = state.theme === 'dark' ? 'light' : 'dark'; render(); }
  else if (action === 'adminTab') { state.adminTab = el.dataset.tab; render(); }
  else if (action === 'logout') { if (fbAuth) fbAuth.signOut(); }
  else if (action === 'cartInc') {
    var p = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (p && p.available) state.cart[p.id] = (state.cart[p.id] || 0) + 1;
    render();
  }
  else if (action === 'cartDec') {
    var id = el.dataset.id;
    state.cart[id] = Math.max(0, (state.cart[id] || 0) - 1);
    render();
  }
  else if (action === 'toggleAvailable') {
    var pa = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (pa) { pa.available = !pa.available; dbSet('products/'+pa.id+'/available', pa.available); }
    render();
  }
  else if (action === 'removeProduct') {
    var rid = el.dataset.id;
    state.products = state.products.filter(function(x){ return x.id !== rid; });
    dbRemove('products/'+rid);
    render();
  }
  else if (action === 'setCurrentLocation') {
    state.currentLocationId = el.dataset.key === 'indisponivel' ? null : el.dataset.key;
    dbSet('currentLocationId', state.currentLocationId);
    render();
  }
  else if (action === 'mapClick') {
    var loc = getLocation(el.dataset.locid);
    var rect = el.getBoundingClientRect();
    var xPct = ((e.clientX - rect.left) / rect.width) * 100;
    var yPct = ((e.clientY - rect.top) / rect.height) * 100;
    if (loc) {
      loc.pin = { x: Math.round(xPct*10)/10, y: Math.round(yPct*10)/10, label: (loc.pin && loc.pin.label) || '' };
      dbSet('locations/'+loc.id+'/pin', loc.pin);
    }
    render();
  }
  else if (action === 'removePin') {
    var locr = getLocation(el.dataset.locid);
    if (locr) { locr.pin = null; dbSet('locations/'+locr.id+'/pin', null); }
    render();
  }
});

document.addEventListener('change', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'setPrice') {
    var p = state.products.find(function(x){ return x.id === el.dataset.id; });
    if (p) { p.price = Number(el.value) || 0; dbSet('products/'+p.id+'/price', p.price); }
  }
  else if (action === 'setOrderStatus') {
    var o = state.orders.find(function(x){ return x.id === el.dataset.id; });
    if (o) { o.status = el.value; dbSet('orders/'+o.id+'/status', o.status); }
  }
  else if (action === 'setHours') {
    var loc = getLocation(el.dataset.locid);
    if (loc) { loc.hours = el.value; dbSet('locations/'+loc.id+'/hours', loc.hours); }
    render();
  }
  else if (action === 'setPinLabel') {
    var locl = getLocation(el.dataset.locid);
    if (locl && locl.pin) { locl.pin.label = el.value; dbSet('locations/'+locl.id+'/pin', locl.pin); }
  }
  else if (action === 'uploadMap') {
    var locid = el.dataset.locid;
    var file = el.files && el.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var dataUrl = ev.target.result;
      var loc = getLocation(locid);
      if (loc) { loc.mapImage = dataUrl; dbSet('locations/'+loc.id+'/mapImage', dataUrl); }
      render();
    };
    reader.readAsDataURL(file);
  }
  else if (action === 'localChange') {
    var loc2 = getLocation(el.value);
    var hint = document.getElementById('localHint');
    if (hint) hint.textContent = loc2 ? 'Horário de funcionamento: ' + loc2.hours : '';
  }
});

document.addEventListener('submit', function(e){
  var loginForm = e.target.closest('[data-action="loginForm"]');
  if (loginForm){
    e.preventDefault();
    var email = document.getElementById('login-email').value.trim();
    var senha = document.getElementById('login-senha').value;
    if (!fbAuth){ state.authError = 'Firebase não está configurado.'; render(); return; }
    fbAuth.signInWithEmailAndPassword(email, senha).then(function(){
      state.authError = ''; render();
    }).catch(function(err){
      state.authError = 'E-mail ou senha incorretos.';
      render();
    });
    return;
  }

  var form = e.target.closest('[data-action="submitOrderForm"]');
  if (!form) return;
  e.preventDefault();
  var errorEl = document.getElementById('formError');
  errorEl.textContent = '';

  var items = cartItems();
  if (items.length === 0){ errorEl.textContent = 'Seu carrinho está vazio. Adicione ao menos um produto.'; return; }

  var nome = document.getElementById('f-nome').value.trim();
  var telefone = document.getElementById('f-telefone').value.trim();
  var localName = document.getElementById('f-local').value;
  var data = document.getElementById('f-data').value;
  var horario = document.getElementById('f-horario').value;
  var observacoes = document.getElementById('f-observacoes').value.trim();

  if (!nome || !telefone || !localName || !data){ errorEl.textContent = 'Preencha nome, telefone, local e data.'; return; }

  var loc = getLocation(localName);
  var ranges = loc ? parseRanges(loc.hours) : [];
  if (ranges.length > 0){
    if (!horario){ errorEl.textContent = 'Informe um horário dentro do funcionamento: ' + loc.hours; return; }
    var mins = timeToMinutes(horario);
    var ok = ranges.some(function(r){ return mins >= r[0] && mins <= r[1]; });
    if (!ok){ errorEl.textContent = 'Horário fora do funcionamento. Disponível: ' + loc.hours; return; }
  }

  var order = {
    id: String(Date.now()),
    nome: nome, telefone: telefone, local: localName, data: data, horario: horario, observacoes: observacoes,
    items: items.map(function(i){ return { name: i.product.name, qty: i.qty, price: i.product.price }; }),
    total: cartTotal(),
    status: 'pendente'
  };
  state.orders.unshift(order);
  dbPushOrder(order);
  state.cart = {};
  state.modalOpen = false;
  state.confirmOpen = true;
  render();
});

initFirebaseSync();
render();
</script>
</body>
</html>
