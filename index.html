<style>
  :root{
    --bg:#FFF9FC; --bg-alt:#F8ECFB; --card:#FFFFFF; --card-2:#FCF4FE;
    --ink:#3B2350; --ink-soft:#8E799B;
    --primary:#A66BF0; --primary-dark:#8A4FDB; --primary-ink:#2E1642;
    --pink:#FF8FC0; --pink-soft:#FFE3EF;
    --lilac-soft:#EEDCFB; --line:#F0DFF8;
    --shadow-tint: rgba(166,107,240,0.20);
    --sticker-shadow: 5px 5px 0 rgba(59,35,80,0.10);
  }
  html{scroll-behavior:smooth;}
  *{box-sizing:border-box;}
  html, body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Quicksand',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh;}
  #app{display:flex;flex-direction:column;min-height:100vh;width:100%;}
  #app main{flex:1 0 auto;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0;}
  p{margin:0;}
  button,select,input,textarea{font-family:inherit;}
  button{cursor:pointer;}
  a{color:inherit;text-decoration:none;}
  .container{max-width:1120px;margin:0 auto;padding:0 20px;}
  .icon{display:inline-block;vertical-align:middle;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  .blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:.55;pointer-events:none;z-index:0;}

  /* header */
  header{position:sticky;top:0;z-index:40;background:var(--bg);border-bottom:2px dashed var(--line);}
  .header-inner{max-width:1120px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;}
  .logo-img{height:36px;display:block;}
  .desktop-nav{display:flex;gap:20px;align-items:center;}
  .nav-link{background:none;border:none;font-weight:700;font-size:14.5px;color:var(--ink-soft);padding:6px 4px;border-radius:8px;}
  .nav-link:hover{color:var(--primary-dark);}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--line);background:var(--card);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .15s ease;position:relative;flex-shrink:0;}
  .icon-btn:hover{transform:rotate(-8deg) scale(1.08);border-color:var(--primary);}
  .icon-btn[disabled]{opacity:.4;cursor:not-allowed;}
  .icon-btn[disabled]:hover{transform:none;border-color:var(--line);}
  .cart-badge{position:absolute;top:-5px;right:-5px;background:var(--pink);color:var(--primary-ink);font-size:10px;font-weight:800;min-width:18px;height:18px;padding:0 3px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .mobile-toggle{display:none;background:none;border:none;color:var(--ink);}
  .mobile-row{display:none;align-items:center;gap:8px;}
  .mobile-menu{border-top:2px dashed var(--line);padding:10px 20px 18px;display:flex;flex-direction:column;gap:4px;background:var(--bg);position:relative;z-index:1;}
  .mobile-menu .nav-link{text-align:left;padding:10px 4px;font-size:15.5px;}
  @media (max-width:860px){ .desktop-nav{display:none !important;} .mobile-toggle{display:inline-flex !important;} .mobile-row{display:flex !important;} }

  /* buttons */
  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:var(--primary-ink);border:2.5px solid var(--primary-ink);padding:12px 22px;border-radius:999px;font-weight:700;font-size:14.5px;box-shadow:var(--sticker-shadow);transition:transform .12s ease, box-shadow .12s ease;}
  .btn-primary:hover{transform:translate(-2px,-2px) rotate(-1deg);box-shadow:7px 7px 0 var(--shadow-tint);}
  .btn-primary:active{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--shadow-tint);}
  .btn-primary[disabled]{opacity:.45;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
  .btn-secondary{display:inline-flex;align-items:center;gap:8px;background:var(--card);color:var(--primary-dark);border:2.5px solid var(--primary);padding:11px 20px;border-radius:999px;font-weight:700;font-size:14.5px;transition:transform .12s ease;}
  .btn-secondary:hover{transform:translate(-2px,-2px) rotate(1deg);background:var(--lilac-soft);}
  .btn-secondary.sm, .btn-primary.sm{padding:8px 16px;font-size:13px;}
  .btn-ghost{background:none;border:none;color:var(--ink-soft);font-weight:700;font-size:12.5px;}

  .pill{display:inline-block;font-size:12px;font-weight:700;padding:5px 13px;border-radius:999px;letter-spacing:.2px;}
  .pill-lilac{background:var(--lilac-soft);color:var(--primary-dark);}
  .pill-blush{background:var(--pink-soft);color:var(--pink);}
  .section-label{font-weight:700;font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:6px;}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:52px 20px 70px;}
  .hero-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;position:relative;z-index:1;}
  @media (max-width:760px){ .hero-grid{grid-template-columns:1fr !important;} }
  .hero h1{font-size:clamp(30px,5vw,48px);line-height:1.15;margin:8px 0 16px;color:var(--ink);}
  .hero h1 span{color:var(--primary-dark);}
  .hero p.lead{font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:460px;font-weight:500;}
  .hero-visual{display:flex;align-items:center;justify-content:center;position:relative;}
  .hero-badge-ring{width:100%;max-width:300px;aspect-ratio:1/1;border-radius:50%;background:var(--card);box-shadow:0 26px 0 -10px var(--pink-soft), 0 20px 46px var(--shadow-tint);display:flex;align-items:center;justify-content:center;padding:22px;position:relative;}
  .hero-badge-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:3px dashed var(--lilac-soft);animation:spin 40s linear infinite;}
  .hero-badge-img{width:100%;height:100%;object-fit:contain;animation:spin 26s linear infinite;filter:drop-shadow(0 6px 14px var(--shadow-tint));}
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* cards */
  .product-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px,1fr));gap:22px;}
  .product-card{background:var(--card);border-radius:26px;overflow:hidden;border:2px solid var(--line);transition:transform .18s ease, box-shadow .18s ease;}
  .product-card:hover{transform:translateY(-4px) rotate(-.5deg);box-shadow:6px 10px 0 var(--shadow-tint);}
  .product-photo{width:100%;aspect-ratio:4/3;border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--card-2);}
  .product-photo img{width:100%;height:100%;object-fit:cover;}
  .product-photo .unavailable-badge{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px;letter-spacing:1px;text-transform:uppercase;}
  .qty-row{display:flex;align-items:center;gap:12px;}
  .qty-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--primary-dark);}
  .qty-btn:hover{border-color:var(--primary);}
  .qty-value{font-weight:800;font-size:15px;min-width:18px;text-align:center;}
  details.ingredients summary{cursor:pointer;font-size:12px;color:var(--ink-soft);font-weight:700;list-style:none;}
  details.ingredients summary::-webkit-details-marker{display:none;}
  details.ingredients p{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
  .stock-note{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

  /* cart summary */
  .cart-box{background:var(--card-2);border:2px dashed var(--line);border-radius:22px;padding:20px 22px;margin-top:30px;}
  .cart-line{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink-soft);padding:6px 0;border-bottom:1px dashed var(--line);}
  .cart-line:last-of-type{border-bottom:none;}
  .cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-top:10px;color:var(--ink);}

  /* status card */
  .status-card{background:var(--card);border:2px solid var(--line);border-radius:24px;padding:20px 24px;display:flex;align-items:center;gap:16px;max-width:460px;}
  .status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}

  /* map + pin */
  .map-wrap{position:relative;border-radius:20px;overflow:hidden;border:2px solid var(--line);background:var(--card-2);margin-top:22px;cursor:crosshair;}
  .map-wrap img{width:100%;display:block;}
  .map-pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .map-pin-label{background:var(--primary);color:var(--primary-ink);font-weight:800;font-size:11.5px;padding:4px 10px;border-radius:999px;white-space:nowrap;margin-bottom:2px;box-shadow:0 4px 10px var(--shadow-tint);}

  /* footer */
  footer{border-top:2px dashed var(--line);background:var(--bg-alt);margin-top:36px;}
  .footer-inner{max-width:1120px;margin:0 auto;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .footer-icons{display:flex;gap:16px;align-items:center;}
  .footer-copy{font-size:11.5px;color:var(--ink-soft);margin:0;}

  /* forms */
  .field{display:block;margin-bottom:16px;}
  .field label{display:block;font-weight:700;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.2px;}
  .input{width:100%;height:44px;border-radius:14px;border:2px solid var(--line);padding:0 14px;font-size:14.5px;color:var(--ink);background:var(--card-2);outline:none;}
  .input:focus{border-color:var(--primary);}
  .input::placeholder{color:var(--ink-soft);}
  textarea.input{height:70px;resize:vertical;padding-top:10px;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .error-text{font-size:12.5px;color:#e0537a;margin-top:6px;min-height:16px;font-weight:700;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(59,35,80,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
  .modal{background:var(--bg);border:3px solid var(--line);border-radius:28px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:28px 26px;position:relative;box-shadow:8px 8px 0 var(--shadow-tint);}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--card);border:2px solid var(--line);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink);}

  /* admin */
  .tab-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
  .tab-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:999px;border:2px solid var(--line);background:var(--card);color:var(--ink-soft);font-weight:700;font-size:13px;}
  .tab-btn.active{border-color:var(--primary-ink);background:var(--primary);color:var(--primary-ink);}
  .admin-row{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--line);border-radius:18px;padding:12px 16px;flex-wrap:wrap;margin-bottom:10px;}
  .avail-toggle{padding:7px 14px;border-radius:999px;border:none;font-weight:700;font-size:12px;}
  .avail-on{background:rgba(78,201,140,0.18);color:#2f8f5e;}
  .avail-off{background:rgba(224,83,122,0.18);color:#c94a6d;}
  .loc-btn{padding:14px 20px;border-radius:18px;border:2px solid var(--line);background:var(--card);cursor:pointer;text-align:left;min-width:160px;}
  .loc-btn.active{border-color:var(--primary-ink);background:var(--lilac-soft);}
  .admin-loc-card{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px 20px;margin-bottom:16px;}
  .file-input{font-size:12.5px;color:var(--ink-soft);}
  .login-box{max-width:400px;margin:70px auto;background:var(--card);border:2px solid var(--line);border-radius:26px;padding:32px 28px;text-align:center;box-shadow:6px 6px 0 var(--shadow-tint);}
  .fw-banner{background:var(--pink-soft);border:2px dashed var(--pink);border-radius:16px;padding:12px 16px;font-size:12.5px;color:var(--ink);margin-bottom:20px;text-align:left;}
  .thumb{width:52px;height:52px;border-radius:14px;overflow:hidden;background:var(--card-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb-upload{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .new-product-card{background:var(--lilac-soft);border:2.5px dashed var(--primary);border-radius:22px;padding:18px 20px;margin-bottom:22px;}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);}}

  section[id]{scroll-margin-top:82px;}
</style>
</head>

/* ---------- helpers ---------- */
function currency(v){ return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function parseRanges(hoursStr){
  var ranges = []; var re = /(\d{1,2}):(\d{2})\s*[–-]\s*(\d{1,2}):(\d{2})/g; var m;
  while((m = re.exec(hoursStr))){ ranges.push([parseInt(m[1])*60+parseInt(m[2]), parseInt(m[3])*60+parseInt(m[4])]); }
  return ranges;
}
function timeToMinutes(t){ var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function getLocation(nameOrId){ return state.locations.find(function(l){ return l.name === nameOrId || l.id === nameOrId; }); }
function getProduct(id){ return state.products.find(function(x){ return x.id === id; }); }
function isSoldOut(p){ return p.stock !== undefined && p.stock !== null && Number(p.stock) <= 0; }
function isOrderable(p){ return p.available !== false && !isSoldOut(p); }
function cartItems(){
  return Object.keys(state.cart).filter(function(id){ return state.cart[id] > 0; }).map(function(id){
    var p = getProduct(id); return { product: p, qty: state.cart[id] };
  }).filter(function(i){ return i.product; });
}
function cartTotal(){ return cartItems().reduce(function(s,i){ return s + i.product.price * i.qty; }, 0); }
function cartCount(){ return cartItems().reduce(function(s,i){ return s + i.qty; }, 0); }

/* ---------- firebase: storage asset upgrade ---------- */
function upgradeAsset(key, applyFn){
  if (!fbStorage) return;
  fbStorage.ref(ASSET_FILES[key]).getDownloadURL().then(function(url){
    applyFn(url); render();
  }).catch(function(){ /* keep fallback silently */ });
}
function upgradeBrandAssets(){
  upgradeAsset('logoCircle', function(url){ LOGO_CIRCLE = url; });
  upgradeAsset('logoPrincipal', function(url){ LOGO_PRINCIPAL = url; });
  upgradeAsset('bombomDeUva', function(url){
    var d = DEFAULT_PRODUCTS.find(function(p){ return p.id==='p1'; }); if(d) d.photo = url;
    var p = getProduct('p1'); if (p && p.photo === FALLBACK.bombomDeUva) p.photo = url;
  });
  upgradeAsset('paoDeMel', function(url){
    var d = DEFAULT_PRODUCTS.find(function(p){ return p.id==='p2'; }); if(d) d.photo = url;
    var p = getProduct('p2'); if (p && p.photo === FALLBACK.paoDeMel) p.photo = url;
  });
  upgradeAsset('mapaFaculdade', function(url){
    var d = DEFAULT_LOCATIONS.find(function(l){ return l.id==='faculdade'; }); if(d) d.mapImage = url;
    var l = getLocation('faculdade'); if (l && l.mapImage === FALLBACK.mapaFaculdade) l.mapImage = url;
  });
}

/* ---------- firebase: realtime database sync ---------- */
function objToArray(obj){ return Object.keys(obj || {}).map(function(id){ var v = obj[id] || {}; v.id = id; return v; }); }
function initFirebaseSync(){
  if (!FIREBASE_READY) return;
  fbDb.ref('products').on('value', function(snap){ var val = snap.val(); if (val) { state.products = objToArray(val); render(); } });
  fbDb.ref('locations').on('value', function(snap){ var val = snap.val(); if (val) { state.locations = objToArray(val); render(); } });
  fbDb.ref('currentLocationId').on('value', function(snap){ var val = snap.val(); state.currentLocationId = (val === undefined) ? state.currentLocationId : val; render(); });
  fbDb.ref('orders').on('value', function(snap){
    var val = snap.val();
    state.orders = objToArray(val).sort(function(a,b){ return Number(b.id) - Number(a.id); });
    if (state.page === 'admin') render();
  });
  fbAuth.onAuthStateChanged(function(user){ state.authUser = user; render(); });
}
function seedFirebaseIfEmpty(){
  if (!FIREBASE_READY) return;
  setTimeout(function(){
    fbDb.ref('products').once('value', function(snap){
      if (!snap.val()){ var obj = {}; DEFAULT_PRODUCTS.forEach(function(p){ obj[p.id] = p; }); fbDb.ref('products').set(obj); }
    });
    fbDb.ref('locations').once('value', function(snap){
      if (!snap.val()){ var obj = {}; DEFAULT_LOCATIONS.forEach(function(l){ obj[l.id] = l; }); fbDb.ref('locations').set(obj); }
    });
    fbDb.ref('currentLocationId').once('value', function(snap){
      if (snap.val() === null) fbDb.ref('currentLocationId').set(state.currentLocationId);
    });
  }, 900);
}
function dbSet(path, value){ if (FIREBASE_READY) fbDb.ref(path).set(value).catch(function(e){ console.error(e); }); }
function dbRemove(path){ if (FIREBASE_READY) fbDb.ref(path).remove().catch(function(e){ console.error(e); }); }
function dbPushOrder(order){ if (FIREBASE_READY) fbDb.ref('orders/' + order.id).set(order).catch(function(e){ console.error(e); }); }

/* ---------- firebase: storage uploads ---------- */
function uploadToStorage(path, file, onDone){
  if (!fbStorage){ onDone(null); return; }
  var ref = fbStorage.ref(path);
  ref.put(file).then(function(snap){ return snap.ref.getDownloadURL(); }).then(function(url){ onDone(url); })
    .catch(function(err){ console.error(err); onDone(null); });
}

/* ---------- small components ---------- */
function LogoImg(){ return '<img class="logo-img" src="'+LOGO_PRINCIPAL+'" alt="Leal ChocoArt">'; }

function ProductPhoto(p){
  var badge = '';
  if (p.available === false) badge = '<div class="unavailable-badge">Indisponível</div>';
  else if (isSoldOut(p)) badge = '<div class="unavailable-badge">Esgotado</div>';
  if (p.photo) return '<div class="product-photo"><img src="'+p.photo+'" alt="'+esc(p.name)+'">' + badge + '</div>';
  return '<div class="product-photo">' + icon('treat', 46, 'var(--primary)') + badge + '</div>';
}

function Pill(text, tone){ return '<span class="pill ' + (tone === 'blush' ? 'pill-blush' : 'pill-lilac') + '">' + text + '</span>'; }

function StatusCard(){
  var loc = state.currentLocationId ? getLocation(state.currentLocationId) : null;
  var color = loc ? '#4ec98c' : '#e0537a';
  var bg = loc ? 'rgba(78,201,140,0.18)' : 'rgba(224,83,122,0.18)';
  var label = loc ? 'Vendendo agora' : 'Indisponível hoje';
  var place = loc ? loc.name : 'Voltamos em breve';
  var hours = loc ? loc.hours : '';
  return '<div class="status-card">' +
    '<div class="status-dot" style="background:'+color+';box-shadow:0 0 0 6px '+bg+'"></div>' +
    '<div><p style="font-weight:700;font-size:15.5px;margin:0">'+label+'</p>' +
    '<p style="font-size:13.5px;color:var(--ink-soft);margin:3px 0 0">'+esc(place) + (hours ? ' · ' + esc(hours) : '') + '</p></div>' +
    '</div>';
}

function MapWithPin(loc, editable){
  if (!loc || !loc.mapImage){
    return '<div class="map-wrap" style="height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:default">' +
      icon('mapPin',28,'var(--primary)') + '<p style="font-size:12.5px;color:var(--ink-soft)">Nenhum mapa configurado</p></div>';
  }
  var pinHtml = '';
  if (loc.pin){
    pinHtml = '<div class="map-pin" style="left:'+loc.pin.x+'%;top:'+loc.pin.y+'%">' +
      '<span class="map-pin-label">'+esc(loc.pin.label || 'Aqui')+'</span>' + icon('mapPin', 30, 'var(--primary)') + '</div>';
  }
  var attrs = editable ? ' data-action="mapClick" data-locid="'+loc.id+'"' : '';
  return '<div class="map-wrap"'+attrs+'><img src="'+loc.mapImage+'" alt="Mapa '+esc(loc.name)+'" draggable="false">' + pinHtml + '</div>';
}

function CartButton(extraClass){

    icon('bag',17) + (count>0 ? '<span class="cart-badge">'+count+'</span>' : '') + '</button>';
}

    var stepper;

      stepper = '<p style="font-size:12px;color:var(--ink-soft);font-weight:700">' + (p.available===false ? 'Indisponível' : 'Esgotado') + '</p>';

      ? '<button class="btn-secondary sm" data-action="toggleAddLocation" style="margin-bottom:18px">'+icon('plus',14)+' Adicionar localização</button>'
      : '<div class="new-product-card">' +
          '<p style="font-weight:800;font-size:14.5px;margin:0 0 12px">Nova localização</p>' +
          '<div class="field"><label>Nome</label><input class="input" id="nl-nome" placeholder="Ex: Praça Central"></div>' +
          '<div class="field"><label>Horário de funcionamento</label><input class="input" id="nl-horas" placeholder="Ex: 14:00 – 18:00"></div>' +
          '<div style="display:flex;gap:10px">' +
            '<button class="btn-primary sm" data-action="createLocation">Salvar</button>' +
            '<button class="btn-ghost" data-action="toggleAddLocation">Cancelar</button>' +
          '</div>' +
        '</div>';

    var locEditors = state.locations.map(function(l){
      return '<div class="admin-loc-card">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
          '<input class="input" style="flex:1;height:38px;font-weight:700" value="'+esc(l.name)+'" data-action="setLocName" data-locid="'+l.id+'">' +
          '<button data-action="removeLocation" data-locid="'+l.id+'" style="background:none;border:none;color:var(--ink-soft)" aria-label="Excluir localização">'+icon('trash',16)+'</button>' +
        '</div>' +
        '<div class="field"><label>Horário de funcionamento</label><input class="input" value="'+esc(l.hours)+'" data-action="setHours" data-locid="'+l.id+'"></div>' +
        '<div class="field"><label>Imagem do mapa</label><input class="file-input" type="file" accept="image/*" data-action="uploadMap" data-locid="'+l.id+'"></div>' +
        MapWithPin(l, true) +
        '<p class="hint">Clique no mapa para posicionar o marcador.</p>' +
        '<div class="field" style="margin-top:12px"><label>Texto do marcador (ex: Sala A24)</label>' +
          '<input class="input" placeholder="Ex: Sala A24" value="'+esc(l.pin ? l.pin.label : '')+'" data-action="setPinLabel" data-locid="'+l.id+'" '+(l.pin?'':'disabled')+'></div>' +
        (l.pin ? '<button class="btn-ghost" data-action="removePin" data-locid="'+l.id+'">Remover marcador</button>' : '') +
        '</div>';
    }).join('');
    body = currentBtns + addLocForm + locEditors;
  }

  return '<div class="container" style="max-width:1000px;padding:40px 20px 80px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px">' +
      '<h1 style="font-size:26px;display:flex;align-items:center;gap:10px">'+icon('settings',22,'var(--primary)')+' Administração</h1>' +
      '<div style="display:flex;align-items:center;gap:10px">' +
        (state.authUser ? '<span style="font-size:12.5px;color:var(--ink-soft)">'+esc(state.authUser.email)+'</span>' : '') +
        (FIREBASE_READY ? '<button class="btn-ghost" data-action="logout">'+icon('logout',14)+' Sair</button>' : '') +
      '</div></div>' +
    '<div class="tab-row">' + tabsHtml + '</div>' +
    '<div>' + body + '</div>' +
    '</div>';
}
function pageAdmin(){ if (FIREBASE_READY && !state.authUser) return pageAdminLogin(); return pageAdminPanel(); }

/* ---------- main render ---------- */
function render(){
  var content = state.page === 'admin' ? pageAdmin() : sectionHero() + sectionProdutos() + sectionLocalizacao() + sectionContato();
  document.getElementById('app').innerHTML = renderHeader() + '<main>' + content + '</main>' + renderFooter() + renderModal() + (state.confirmOpen ? renderConfirm() : '') + renderDeleteLocationModal();
}

/* ---------- actions ---------- */
function go(page){ state.page = page; state.menuOpen = false; state.authError = ''; render(); window.scrollTo({top:0}); }
function openModal(){ if (cartCount() === 0) return; state.modalOpen = true; render(); }
function closeModal(){ state.modalOpen = false; render(); }

document.addEventListener('click', function(e){
  var stopEl = e.target.closest('[data-stop]');
  var overlay = e.target.closest('[data-action="closeModalBg"], [data-action="closeConfirmBg"], [data-action="closeDeleteLocationBg"]');
  if (overlay && !stopEl){
    if (overlay.dataset.action === 'closeModalBg') closeModal();
    else if (overlay.dataset.action === 'closeDeleteLocationBg') { state.confirmDeleteLocationId = null; render(); }
    else { state.confirmOpen = false; render(); }
    return;
  }
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;

  if (action === 'go') { e.preventDefault(); go(el.dataset.page); }
  else if (action === 'openModal') openModal();
  else if (action === 'closeModal') closeModal();
  else if (action === 'closeConfirm') { state.confirmOpen = false; render(); }
  else if (action === 'toggleMenu') { state.menuOpen = !state.menuOpen; render(); }
  else if (action === 'closeMenu') { state.menuOpen = false; render(); }
  else if (action === 'adminTab') { state.adminTab = el.dataset.tab; render(); }
  else if (action === 'logout') { if (fbAuth) fbAuth.signOut(); }
  else if (action === 'toggleAddProduct') { state.addingProduct = !state.addingProduct; render(); }
  else if (action === 'createProduct') {
    var nome = document.getElementById('np-nome').value.trim();
    if (!nome) { alert('Informe o nome do produto.'); return; }
    var newProd = {
      id: 'p' + Date.now(),
      name: nome,
      desc: document.getElementById('np-desc').value.trim(),
      ingredients: document.getElementById('np-ing').value.trim(),
      price: Number(document.getElementById('np-preco').value) || 0,
      stock: Number(document.getElementById('np-estoque').value) || 0,
      available: true,
      photo: null
    };
    state.products.push(newProd);
    dbSet('products/' + newProd.id, newProd);
    state.addingProduct = false;
    render();
    var file = document.getElementById('np-imagem').files[0];
    if (file){
      uploadToStorage('products/' + newProd.id + '-' + Date.now() + '-' + file.name, file, function(url){
        if (url){ newProd.photo = url; dbSet('products/' + newProd.id + '/photo', url); render(); }
      });
    }
  }
  else if (action === 'toggleAddLocation') { state.addingLocation = !state.addingLocation; render(); }
  else if (action === 'createLocation') {
    var lnome = document.getElementById('nl-nome').value.trim();
    if (!lnome) { alert('Informe o nome da localização.'); return; }
    var newLoc = {
      id: 'loc' + Date.now(),
      name: lnome,
      hours: document.getElementById('nl-horas').value.trim() || 'A combinar',
      mapImage: null,
      pin: null
    };
    state.locations.push(newLoc);
    dbSet('locations/' + newLoc.id, newLoc);
    state.addingLocation = false;
    render();
  }
  else if (action === 'removeLocation') {
    state.confirmDeleteLocationId = el.dataset.locid;
    render();
  }
  else if (action === 'cancelDeleteLocation') { state.confirmDeleteLocationId = null; render(); }
  else if (action === 'confirmDeleteLocation') {
    var lrid = state.confirmDeleteLocationId;
    if (lrid){
      state.locations = state.locations.filter(function(x){ return x.id !== lrid; });
      if (state.currentLocationId === lrid) { state.currentLocationId = null; dbSet('currentLocationId', null); }
      dbRemove('locations/' + lrid);
    }
    state.confirmDeleteLocationId = null;
    render();
  }
  else if (action === 'toggleProduced') {
    var op = state.orders.find(function(x){ return x.id === el.dataset.id; });
    if (op) { op.produced = !op.produced; dbSet('orders/'+op.id+'/produced', op.produced); }
    render();
  }
  else if (action === 'cartInc') {
    var p = getProduct(el.dataset.id);
    if (p && isOrderable(p)) {
      var maxStock = (p.stock === undefined || p.stock === null) ? Infinity : Number(p.stock);
      var cur = state.cart[p.id] || 0;
      if (cur < maxStock) state.cart[p.id] = cur + 1;
    }
    render();
  }
  else if (action === 'cartDec') { var id = el.dataset.id; state.cart[id] = Math.max(0, (state.cart[id] || 0) - 1); render(); }
  else if (action === 'toggleAvailable') { var pa = getProduct(el.dataset.id); if (pa) { pa.available = pa.available === false ? true : false; dbSet('products/'+pa.id+'/available', pa.available); } render(); }
  else if (action === 'removeProduct') { var rid = el.dataset.id; state.products = state.products.filter(function(x){ return x.id !== rid; }); dbRemove('products/'+rid); render(); }
  else if (action === 'setCurrentLocation') { state.currentLocationId = el.dataset.key === 'indisponivel' ? null : el.dataset.key; dbSet('currentLocationId', state.currentLocationId); render(); }
  else if (action === 'mapClick') {
    var loc = getLocation(el.dataset.locid);
    var rect = el.getBoundingClientRect();
    var xPct = ((e.clientX - rect.left) / rect.width) * 100;
    var yPct = ((e.clientY - rect.top) / rect.height) * 100;
    if (loc) { loc.pin = { x: Math.round(xPct*10)/10, y: Math.round(yPct*10)/10, label: (loc.pin && loc.pin.label) || '' }; dbSet('locations/'+loc.id+'/pin', loc.pin); }
    render();
  }
  else if (action === 'removePin') { var locr = getLocation(el.dataset.locid); if (locr) { locr.pin = null; dbSet('locations/'+locr.id+'/pin', null); } render(); }
});

document.addEventListener('change', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'setPrice') { var p = getProduct(el.dataset.id); if (p) { p.price = Number(el.value) || 0; dbSet('products/'+p.id+'/price', p.price); } }
  else if (action === 'setStock') { var ps = getProduct(el.dataset.id); if (ps) { ps.stock = Number(el.value) || 0; dbSet('products/'+ps.id+'/stock', ps.stock); render(); } }
  else if (action === 'setName') { var pn = getProduct(el.dataset.id); if (pn) { pn.name = el.value; dbSet('products/'+pn.id+'/name', pn.name); } }
  else if (action === 'setDesc') { var pd = getProduct(el.dataset.id); if (pd) { pd.desc = el.value; dbSet('products/'+pd.id+'/desc', pd.desc); } }
  else if (action === 'setIngredients') { var pi = getProduct(el.dataset.id); if (pi) { pi.ingredients = el.value; dbSet('products/'+pi.id+'/ingredients', pi.ingredients); } }
  else if (action === 'setOrderStatus') { var o = state.orders.find(function(x){ return x.id === el.dataset.id; }); if (o) { o.status = el.value; dbSet('orders/'+o.id+'/status', o.status); } }
  else if (action === 'setHours') { var loc = getLocation(el.dataset.locid); if (loc) { loc.hours = el.value; dbSet('locations/'+loc.id+'/hours', loc.hours); } render(); }
  else if (action === 'setLocName') { var locn = getLocation(el.dataset.locid); if (locn) { locn.name = el.value; dbSet('locations/'+locn.id+'/name', locn.name); } render(); }
  else if (action === 'setPinLabel') { var locl = getLocation(el.dataset.locid); if (locl && locl.pin) { locl.pin.label = el.value; dbSet('locations/'+locl.id+'/pin', locl.pin); } }
  else if (action === 'uploadMap') {
    var locid = el.dataset.locid; var file = el.files && el.files[0]; if (!file) return;
    uploadToStorage('locations/' + locid + '-' + Date.now() + '-' + file.name, file, function(url){
      if (!url) { alert('Falha ao enviar a imagem.'); return; }
      var loc = getLocation(locid); if (loc) { loc.mapImage = url; dbSet('locations/'+loc.id+'/mapImage', url); }
      render();
    });
  }
  else if (action === 'uploadProductPhoto') {
    var pid = el.dataset.id; var pf = el.files && el.files[0]; if (!pf) return;
    uploadToStorage('products/' + pid + '-' + Date.now() + '-' + pf.name, pf, function(url){
      if (!url) { alert('Falha ao enviar a imagem.'); return; }
      var p = getProduct(pid); if (p) { p.photo = url; dbSet('products/'+p.id+'/photo', url); }
      render();
    });
  }
  else if (action === 'localChange') { var loc2 = getLocation(el.value); var hint = document.getElementById('localHint'); if (hint) hint.textContent = loc2 ? 'Horário de funcionamento: ' + loc2.hours : ''; }
});

document.addEventListener('submit', function(e){
  var loginForm = e.target.closest('[data-action="loginForm"]');
  if (loginForm){
    e.preventDefault();
    var email = document.getElementById('login-email').value.trim();
    var senha = document.getElementById('login-senha').value;
    if (!fbAuth){ state.authError = 'Firebase não está configurado.'; render(); return; }
    fbAuth.signInWithEmailAndPassword(email, senha).then(function(){ state.authError = ''; render(); })
      .catch(function(){ state.authError = 'E-mail ou senha incorretos.'; render(); });
    return;
  }
  var form = e.target.closest('[data-action="submitOrderForm"]');
  if (!form) return;
  e.preventDefault();
  var errorEl = document.getElementById('formError');
  errorEl.textContent = '';
  var items = cartItems();
  if (items.length === 0){ errorEl.textContent = 'Seu carrinho está vazio. Adicione ao menos um produto.'; return; }

  var nome = document.getElementById('f-nome').value.trim();
  var telefone = document.getElementById('f-telefone').value.trim();
  var localName = document.getElementById('f-local').value;
  var data = document.getElementById('f-data').value;
  var horario = document.getElementById('f-horario').value;
  var observacoes = document.getElementById('f-observacoes').value.trim();
  if (!nome || !telefone || !localName || !data){ errorEl.textContent = 'Preencha nome, telefone, local e data.'; return; }

  var loc = getLocation(localName);
  var ranges = loc ? parseRanges(loc.hours) : [];
  if (ranges.length > 0){
    if (!horario){ errorEl.textContent = 'Informe um horário dentro do funcionamento: ' + loc.hours; return; }
    var mins = timeToMinutes(horario);
    var ok = ranges.some(function(r){ return mins >= r[0] && mins <= r[1]; });
    if (!ok){ errorEl.textContent = 'Horário fora do funcionamento. Disponível: ' + loc.hours; return; }
  }

  var order = {
    id: String(Date.now()), nome: nome, telefone: telefone, local: localName, data: data, horario: horario, observacoes: observacoes,
    items: items.map(function(i){ return { name: i.product.name, qty: i.qty, price: i.product.price }; }),
    total: cartTotal(), status: 'pendente', produced: false
  };
  state.orders.unshift(order);
  dbPushOrder(order);
  items.forEach(function(i){
    var p = getProduct(i.product.id);
    if (p && p.stock !== undefined && p.stock !== null){ p.stock = Math.max(0, Number(p.stock) - i.qty); dbSet('products/'+p.id+'/stock', p.stock); }
  });
  state.cart = {};
  state.modalOpen = false;
  state.confirmOpen = true;
  render();
});

upgradeBrandAssets();
initFirebaseSync();
seedFirebaseIfEmpty();
render();
</script>
</body>
</html>
